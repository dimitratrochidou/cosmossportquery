<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Sport HR | Talent Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --cosmos-red: #e30613; --bg: #050505; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; overflow-x: hidden; }
        
        .bg-glow { position: absolute; width: 450px; height: 450px; background: var(--cosmos-red); filter: blur(180px); border-radius: 50%; z-index: -1; opacity: 0.15; animation: move 12s infinite alternate; }
        @keyframes move { from { transform: translate(-25%, -25%); } to { transform: translate(25%, 25%); } }

        .container { width: 95%; max-width: 500px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); padding: 45px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .logo { width: 220px; margin-bottom: 30px; }

        .screen { display: none; animation: fadeIn 0.6s ease; }
        .active { display: block; }

        h2 { font-weight: 900; font-size: 1.7rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: -1px; }
        p { color: #999; font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; }

        /* Form Inputs */
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { text-align: left; flex: 1; }
        label { display: block; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; color: var(--cosmos-red); font-weight: 700; margin-bottom: 8px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: white; font-family: 'Montserrat', sans-serif; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--cosmos-red); background: rgba(255,255,255,0.05); }

        /* Quiz */
        .progress-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 35px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--cosmos-red); transition: 0.6s ease; box-shadow: 0 0 15px var(--cosmos-red); }
        .options { display: grid; gap: 12px; }
        .opt { background: rgba(255,255,255,0.04); padding: 18px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; text-align: left; font-size: 0.95rem; }
        .opt:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .opt.selected { border-color: var(--cosmos-red); background: rgba(227, 6, 19, 0.15); }

        /* ΣΤΑΘΕΡΟ ΚΟΚΚΙΝΟ ΚΟΥΜΠΙ */
        .btn-main { width: 100%; padding: 20px; border-radius: 18px; border: none; background: var(--cosmos-red); color: white; font-weight: 900; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: 0.3s; letter-spacing: 1px; margin-top: 30px; box-shadow: 0 10px 25px rgba(227, 6, 19, 0.3); }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(227, 6, 19, 0.5); }
        .btn-back { background: transparent; color: #555; border: none; margin-top: 15px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="container">
    <img src="images.png" alt="Cosmos Sport" class="logo" id="logo" onerror="this.src='https://via.placeholder.com/200x60/000000/ffffff?text=COSMOS+SPORT'">

    <div id="scr-welcome" class="screen active">
        <h2>Join the Squad.</h2>
        <p>Θέλεις να εργαστείς στο πιο δυναμικό περιβάλλον στον χώρο του αθλητισμού; Δες αν έχεις το <b>Cosmos DNA</b>!</p>
        <button class="btn-main" onclick="nextScreen('scr-form')">Ξεκινάμε</button>
    </div>

    <div id="scr-form" class="screen">
        <h2>Who are you?</h2>
        <p>Συμπλήρωσε τα στοιχεία σου για να ξεκινήσει το scouting.</p>
        <div class="form-row">
            <div class="form-group">
                <label>Όνομα</label>
                <input type="text" id="fname" placeholder="Γιάννης">
            </div>
            <div class="form-group">
                <label>Επίθετο</label>
                <input type="text" id="lname" placeholder="Παπαδόπουλος">
            </div>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="john@example.com">
        </div>
        <button class="btn-main" onclick="validateForm()">Συνέχεια</button>
    </div>

    <div id="scr-quiz" class="screen">
        <div class="progress-bar"><div id="fill"></div></div>
        <h2 id="q-text" style="font-size: 1.25rem;"></h2>
        <div class="options" id="opt-container"></div>
        <button class="btn-main" id="btn-next" onclick="nextQ()">Επόμενο</button>
        <button class="btn-back" id="btn-back" onclick="prevQ()">Πίσω</button>
    </div>

    <div id="scr-result" class="screen">
        <div id="res-emoji" style="font-size: 4rem; margin-bottom: 10px;">🔥</div>
        <div id="res-score" style="font-size: 3.5rem; font-weight: 900; color: var(--cosmos-red); margin-bottom: 10px;">0%</div>
        <h2 id="res-title"></h2>
        <p id="res-desc"></p>
        <button class="btn-main" onclick="location.reload()">Κλείσιμο</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Πόσο σημαντικός είναι ο αθλητισμός στη ζωή σου;", a: ["Τρόπος ζωής / Αθλητής", "Αθλούμαι συχνά", "Αγαπώ το athletic style", "Δεν ασχολούμαι"], w: [10, 8, 5, 0] },
        { q: "Είσαι έτοιμος/η να δουλέψεις σε κυλιόμενο ωράριο (Σάββατα/Γιορτές);", a: ["Φυσικά, κανένα πρόβλημα!", "Συνήθως ναι", "Μόνο αν υπάρχει ανάγκη", "Όχι, θέλω σταθερό ωράριο"], w: [10, 7, 3, -20] },
        { q: "Τι θα έκανες αν ένας πελάτης ήταν δυσαρεστημένος;", a: ["Θα άκουγα με υπομονή και θα έδινα λύση", "Θα καλούσα τον υπεύθυνο", "Θα ζητούσα συγγνώμη", "Θα προσπαθούσα να τελειώσω γρήγορα"], w: [10, 7, 5, 2] },
        { q: "Σου αρέσει να δουλεύεις σε ομάδα;", a: ["Πάντα! Together We Grow", "Μου αρέσει η συνεργασία", "Προτιμώ να δουλεύω μόνος", "Εξαρτάται από τους άλλους"], w: [10, 8, 2, 5] },
        { q: "Πόσο καλά γνωρίζεις τα αθλητικά brands;", a: ["Τα παρακολουθώ καθημερινά", "Γνωρίζω τα βασικά", "Μαθαίνω γρήγορα", "Δεν έχω ιδιαίτερη γνώση"], w: [10, 8, 7, 2] },
        { q: "Τι θα πρότεινες σε κάποιον που ψάχνει παπούτσια running;", a: ["Θα τον ρωτούσα για το έδαφος και τη χρήση", "Θα του έδειχνα τα best sellers", "Θα του έδειχνα τα πιο ακριβά", "Θα του έδειχνα αυτά που μου αρέσουν"], w: [10, 7, 2, 3] }
    ];

    let current = 0;
    let userAnswers = [];
    let userData = {};

    function nextScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function validateForm() {
        const fn = document.getElementById('fname').value;
        const ln = document.getElementById('lname').value;
        const em = document.getElementById('email').value;
        if(!fn || !ln || !em) { alert("Συμπλήρωσε όλα τα πεδία!"); return; }
        userData = { fn, ln, em };
        nextScreen('scr-quiz');
        renderQ();
    }

    function renderQ() {
        const q = questions[current];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('fill').style.width = ((current + 1) / questions.length * 100) + "%";
        
        const container = document.getElementById('opt-container');
        container.innerHTML = "";
        q.a.forEach((ans, i) => {
            const div = document.createElement('div');
            div.className = "opt" + (userAnswers[current] === i ? " selected" : "");
            div.innerText = ans;
            div.onclick = () => { userAnswers[current] = i; renderQ(); };
            container.appendChild(div);
        });

        document.getElementById('btn-back').style.visibility = current === 0 ? "hidden" : "visible";
        document.getElementById('btn-next').innerText = current === questions.length - 1 ? "Ολοκλήρωση" : "Επόμενο";
    }

    function nextQ() {
        if(userAnswers[current] === undefined) { alert("Επίλεξε μια απάντηση!"); return; }
        if(current < questions.length - 1) {
            current++;
            renderQ();
        } else {
            showResult();
        }
    }

    function prevQ() {
        if(current > 0) {
            current--;
            renderQ();
        }
    }

    function showResult() {
        nextScreen('scr-result');
        let total = 0;
        userAnswers.forEach((idx, i) => total += questions[i].w[idx]);
        let score = Math.max(0, Math.round((total / 60) * 100));
        
        document.getElementById('res-score').innerText = score + "%";
        const title = document.getElementById('res-title');
        const desc = document.getElementById('res-desc');
        const emoji = document.getElementById('res-emoji');

        if(score >= 85) {
            emoji.innerText = "🏆";
            title.innerText = "Elite Match, " + userData.fn + "!";
            desc.innerText = "Είσαι ακριβώς αυτό που ψάχνουμε! Το DNA σου ταιριάζει απόλυτα στην Cosmos Sport.";
        } else if(score >= 50) {
            emoji.innerText = "💪";
            title.innerText = "Strong Potential!";
            desc.innerText = "Έχεις πολύ καλά στοιχεία. Θα θέλαμε να σε γνωρίσουμε καλύτερα!";
        } else {
            emoji.innerText = "👍";
            title.innerText = "Ευχαριστούμε!";
            desc.innerText = "Θα κρατήσουμε το βιογραφικό σου για μελλοντικές θέσεις που ταιριάζουν στο προφίλ σου.";
        }
    }
</script>
</body>
</html>
